# Leather Mobile Wallet Smoke Tests
appId: io.leather.mobilewallet
name: Smoke Tests
---
# Scenario: App launches and user can create a new wallet
- launchApp

# Given the user is on the home screen
- assertVisible: 'All accounts'

# When the user toggles the settings button it should work
- tapOn:
    id: 'homeSettingsButton'
- assertVisible: 'SETTINGS'
- tapOn:
    id: 'backButton'
# E2E notes: Edgar deleted dev console in https://github.com/leather-io/mono/commit/587cd6a54321487011a34c736b00cbe1b1a3fec1
# we used that a lot in E2E tests to reset wallets and accounts
# we could be better off to stop doing this as it just slows everything down
# when we hit LaunchApp it returns to the default state
# if we want to re-test empty state we need to modify the clean up flow to run
